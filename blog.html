<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blogs – Rappod</title>
<link rel="stylesheet" href="css/shared.css"/>
<style>
/* blog.css */
.blog-layout { display: grid; grid-template-columns: 260px 1fr; gap: 40px; padding: 40px 40px 60px; max-width: 1280px; margin: 0 auto; }

/* Sidebar */
.blog-sidebar-search { display: flex; margin-bottom: 30px; }
.blog-sidebar-search input {
  flex: 1; padding: 10px 16px; border: 1.5px solid var(--border-med);
  border-right: none; border-radius: 30px 0 0 30px; font-size: 13.5px; outline: none;
}
.blog-sidebar-search button {
  background: var(--accent); color: #fff; border: none;
  padding: 10px 16px; border-radius: 0 30px 30px 0; font-size: 14px;
}
.sidebar-widget { margin-bottom: 28px; }
.sidebar-widget-title {
  font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px;
  color: #222; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--border);
}
.blog-cat-list li { padding: 7px 0; border-bottom: 1px solid var(--border); }
.blog-cat-list li a { font-size: 13.5px; color: #555; display: flex; justify-content: space-between; }
.blog-cat-list li a:hover { color: var(--accent); }

.latest-post { display: flex; gap: 12px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.latest-post:last-child { border-bottom: none; }
.latest-post img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.latest-post-info h5 { font-size: 12.5px; font-weight: 600; line-height: 1.4; margin-bottom: 3px; }
.latest-post-info h5 a:hover { color: var(--accent); }
.latest-post-info time { font-size: 11.5px; color: var(--text-muted); }

.social-blog-links { display: flex; gap: 10px; flex-wrap: wrap; }
.social-blog-link {
  width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border-med);
  display: flex; align-items: center; justify-content: center; color: #666;
  font-size: 13px; transition: all .2s;
}
.social-blog-link:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.social-blog-link svg { width: 14px; height: 14px; }

.tag-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.tag-chip {
  padding: 5px 12px; border: 1.5px solid var(--border-med); border-radius: 30px;
  font-size: 12px; cursor: pointer; color: #555; background: #fff; transition: all .2s;
}
.tag-chip:hover, .tag-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Blog cards */
.blog-card { margin-bottom: 36px; }
.blog-card-img { position: relative; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
.blog-card-img img { width: 100%; height: 320px; object-fit: cover; transition: transform .4s; display: block; }
.blog-card:hover .blog-card-img img { transform: scale(1.03); }
.blog-tags { position: absolute; top: 14px; left: 14px; display: flex; gap: 6px; }
.blog-tag {
  background: #fff; color: #333; font-size: 11.5px; font-weight: 700;
  padding: 4px 10px; border-radius: 30px; box-shadow: 0 1px 4px rgba(0,0,0,.1);
}
.blog-date { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
.blog-card-title { font-size: 1.2rem; font-weight: 800; color: #1a1a1a; margin-bottom: 10px; line-height: 1.3; }
.blog-card-title a:hover { color: var(--accent); }
.blog-card-excerpt { font-size: 13.5px; color: #666; line-height: 1.7; margin-bottom: 16px; }
.blog-read-more { font-size: 13px; font-weight: 600; color: #fff; background: var(--accent); padding: 9px 22px; border-radius: 30px; display: inline-block; transition: background .2s; }
.blog-read-more:hover { background: var(--accent-dark); color: #fff; }

@media(max-width:900px){ .blog-layout{grid-template-columns:1fr;padding:20px 16px;} }
</style>
</head>
<body>

<div id="header-root"></div>

<section class="page-hero">
  <div class="page-hero-deco left">
    <img src="assets/uploads/2023/08/index-6-1.jpg" alt="" style="height:130px;border-radius:8px;" onerror="this.style.display='none'"/>
  </div>
  <div class="page-hero-deco right">
    <img src="assets/uploads/2023/10/banner-1.jpg" alt="" style="height:140px;border-radius:8px;" onerror="this.style.display='none'"/>
  </div>
  <div class="page-hero-deco-dash"></div>
  <div class="page-hero-center">
    <h1>Blogs</h1>
    <nav class="breadcrumb">
      <a href="index.html">Home</a><span>›</span><span>Blog</span>
    </nav>
  </div>
</section>

<div class="blog-layout">

  <!-- SIDEBAR -->
  <aside class="blog-sidebar">
    <div class="blog-sidebar-search">
      <input type="text" id="blog-search-input" placeholder="Search..." oninput="filterBlog()"/>
      <button onclick="filterBlog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>

    <div class="sidebar-widget">
      <div class="sidebar-widget-title">Categories</div>
      <ul class="blog-cat-list" id="blog-cat-list"></ul>
    </div>

    <div class="sidebar-widget">
      <div class="sidebar-widget-title">Latest Posts</div>
      <div id="latest-posts"></div>
    </div>

    <div class="sidebar-widget">
      <div class="sidebar-widget-title">Social</div>
      <div class="social-blog-links">
        <a href="#" class="social-blog-link"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
        <a href="#" class="social-blog-link"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg></a>
        <a href="#" class="social-blog-link"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.19a8.16 8.16 0 0 0 4.77 1.52V6.23a4.85 4.85 0 0 1-1-.54z"/></svg></a>
        <a href="#" class="social-blog-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></a>
        <a href="#" class="social-blog-link" style="font-size:11px;font-weight:700;">Bē</a>
      </div>
    </div>

    <div class="sidebar-widget">
      <div class="sidebar-widget-title">Tag</div>
      <div class="tag-chips" id="tag-chips"></div>
    </div>
  </aside>

  <!-- BLOG LISTING -->
  <main>
    <div id="blog-listing"></div>
    <div class="pagination" id="blog-pagination"></div>
  </main>

</div>

<div id="footer-root"></div>
<button id="scroll-top-btn" class="scroll-top" aria-label="Back to top">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<script src="data/mock.js"></script>
<script src="js/shared.js"></script>
<script>
document.getElementById('header-root').innerHTML = buildHeader('blog');
document.getElementById('footer-root').innerHTML = buildFooter();

let blogState = { cat:'', tag:'', search:'', page:1 };
const BLOG_PER = 6;

function buildBlogSidebar() {
  // Categories
  const cats = [...new Set(RAPPOD.blogPosts.map(p=>p.cat))];
  document.getElementById('blog-cat-list').innerHTML = 
    `<li><a href="#" onclick="setBlogCat('',event)">All Posts <span>${RAPPOD.blogPosts.length}</span></a></li>` +
    cats.map(c=>`<li><a href="#" onclick="setBlogCat('${c}',event)">${c} <span>${RAPPOD.blogPosts.filter(p=>p.cat===c).length}</span></a></li>`).join('');

  // Latest posts
  document.getElementById('latest-posts').innerHTML = RAPPOD.blogPosts.slice(0,3).map(p=>`
    <div class="latest-post">
      <img src="${p.thumb}" alt="${p.title}" onerror="this.src='assets/uploads/2023/01/blog-1-500x500.jpg'"/>
      <div class="latest-post-info">
        <time>${p.date}</time>
        <h5><a href="#">${p.title.substring(0,45)}${p.title.length>45?'...':''}</a></h5>
      </div>
    </div>`).join('');

  // Tags
  const tags = [...new Set(RAPPOD.blogPosts.flatMap(p=>p.tags))];
  document.getElementById('tag-chips').innerHTML = tags.map(t=>`
    <button class="tag-chip" onclick="setBlogTag('${t}',this)">${t}</button>`).join('');
}

function setBlogCat(cat, e) {
  e && e.preventDefault();
  blogState.cat = cat; blogState.page = 1; renderBlog();
}
function setBlogTag(tag, btn) {
  blogState.tag = blogState.tag === tag ? '' : tag;
  blogState.page = 1;
  document.querySelectorAll('.tag-chip').forEach(b => b.classList.remove('active'));
  if (blogState.tag) btn.classList.add('active');
  renderBlog();
}
function filterBlog() {
  blogState.search = document.getElementById('blog-search-input').value;
  blogState.page = 1; renderBlog();
}

function renderBlog() {
  let posts = [...RAPPOD.blogPosts];
  if (blogState.cat)    posts = posts.filter(p=>p.cat===blogState.cat);
  if (blogState.tag)    posts = posts.filter(p=>p.tags.includes(blogState.tag));
  if (blogState.search) posts = posts.filter(p=>p.title.toLowerCase().includes(blogState.search.toLowerCase()));

  const start = (blogState.page-1)*BLOG_PER;
  const paged = posts.slice(start, start+BLOG_PER);

  document.getElementById('blog-listing').innerHTML = paged.length
    ? paged.map(p=>`
      <article class="blog-card">
        <div class="blog-card-img">
          <img src="${p.image}" alt="${p.title}" onerror="this.src='assets/uploads/2023/01/blog-1-720x484.jpg'"/>
          <div class="blog-tags">${p.tags.slice(0,2).map(t=>`<span class="blog-tag">${t}</span>`).join('')}</div>
        </div>
        <div class="blog-date">${p.date}</div>
        <h2 class="blog-card-title"><a href="#">${p.title}</a></h2>
        <p class="blog-card-excerpt">${p.excerpt}</p>
        <a href="#" class="blog-read-more">Read More</a>
      </article>`).join('')
    : '<p style="padding:40px;text-align:center;color:#999;">No posts found.</p>';

  const pages = Math.ceil(posts.length/BLOG_PER);
  document.getElementById('blog-pagination').innerHTML = [
    pages>1?`<button class="page-btn arrow" onclick="blogPage(${blogState.page-1})">‹</button>`:'',
    ...Array.from({length:pages},(_,i)=>`<button class="page-btn${i+1===blogState.page?' active':''}" onclick="blogPage(${i+1})">${i+1}</button>`),
    pages>1?`<button class="page-btn arrow" onclick="blogPage(${blogState.page+1})">›</button>`:'',
  ].join('');
}

function blogPage(p) {
  const pages = Math.ceil(RAPPOD.blogPosts.length/BLOG_PER);
  blogState.page = Math.max(1, Math.min(p, pages));
  renderBlog();
  window.scrollTo({top:300,behavior:'smooth'});
}

document.addEventListener('DOMContentLoaded', ()=>{ buildBlogSidebar(); renderBlog(); });
</script>
</body>
</html>
